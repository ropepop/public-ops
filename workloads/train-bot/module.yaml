schema: 1
module_id: train_bot
owner: arbuzas
runtime:
  type: external
  healthcheck: curl -fsS https://train-bot.jolkins.id.lv/api/v1/ready >/dev/null
  run_id_env: ARBUZAS_RELEASE_ID
components:
  - id: train_bot
    start: docker compose --project-name arbuzas --env-file /etc/arbuzas/current/release.env -f /etc/arbuzas/current/infra/arbuzas/docker/compose.yml up -d train_bot train_tunnel
    stop: docker compose --project-name arbuzas --env-file /etc/arbuzas/current/release.env -f /etc/arbuzas/current/infra/arbuzas/docker/compose.yml stop train_tunnel train_bot
    health: curl -fsS http://127.0.0.1:9317/api/v1/ready >/dev/null
    redeploy:
      mode: compose_release
      release_root: /etc/arbuzas/releases
observability:
  event_source: train_bot
  evidence_root: ops/evidence/train-bot
