schema: 1
module_id: site_notifier
owner: arbuzas
runtime:
  type: external
  healthcheck: docker compose --project-name arbuzas --env-file /etc/arbuzas/current/release.env -f /etc/arbuzas/current/infra/arbuzas/docker/compose.yml exec -T site_notifications python /opt/site-notifications/app.py healthcheck >/dev/null
  run_id_env: ARBUZAS_RELEASE_ID
components:
  - id: site_notifier
    start: docker compose --project-name arbuzas --env-file /etc/arbuzas/current/release.env -f /etc/arbuzas/current/infra/arbuzas/docker/compose.yml up -d site_notifications
    stop: docker compose --project-name arbuzas --env-file /etc/arbuzas/current/release.env -f /etc/arbuzas/current/infra/arbuzas/docker/compose.yml stop site_notifications
    health: docker compose --project-name arbuzas --env-file /etc/arbuzas/current/release.env -f /etc/arbuzas/current/infra/arbuzas/docker/compose.yml exec -T site_notifications python /opt/site-notifications/app.py healthcheck >/dev/null
    redeploy:
      mode: compose_release
      release_root: /etc/arbuzas/releases
observability:
  event_source: site_notifications
  evidence_root: ops/evidence/site-notifications
